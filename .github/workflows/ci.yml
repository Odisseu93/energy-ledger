name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Quality gate: lint + build + test coverage
  # Runs on every push and pull request to main.
  # ─────────────────────────────────────────────
  quality:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Generate Prisma client from schema (required before build/test)
      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Deploy: runs only on pushes to main after
  # the quality gate passes.
  #
  # Uncomment and configure one of the options
  # below according to your hosting platform.
  # ─────────────────────────────────────────────
  # deploy:
  #   name: Deploy
  #   needs: quality
  #   runs-on: ubuntu-latest
  #   if: github.ref == 'refs/heads/main' && github.event_name == 'push'
  #
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #
  #     # ── Option A: Render ──────────────────────
  #     # Add RENDER_DEPLOY_HOOK_URL to repository secrets.
  #     # (Render dashboard → your service → Settings → Deploy Hook)
  #     #
  #     # - name: Trigger Render deploy
  #     #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
  #
  #     # ── Option B: Railway ─────────────────────
  #     # Railway handles deploys automatically via its own GitHub integration.
  #     # Enable it in the Railway dashboard → project → Settings → Source.
  #     # No extra step needed here.
