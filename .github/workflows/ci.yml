name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Quality gate: lint + build + test coverage
  # Runs on every push and pull request to main.
  # ─────────────────────────────────────────────
  quality:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Generate Prisma client from schema (required before build/test)
      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Deploy: handled by Railway.
  # Railway deploys automatically on push to main
  # via GitHub integration (Railway dashboard →
  # project → Settings → Source). No CI step needed.
  #
  # Production URL: https://energy-ledger.up.railway.app
  # Health: https://energy-ledger.up.railway.app/health
  # Docs:   https://energy-ledger.up.railway.app/docs
  # ─────────────────────────────────────────────
